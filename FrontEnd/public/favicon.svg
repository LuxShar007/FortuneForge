    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE881" />
      <stop offset="50%" stop-color="#C79D32" />
      <stop offset="100%" stop-color="#9A7012" />
    </linearGradient>
    <linearGradient id="dark-gold" x1="0%" y1="0%" x2="100%" y2="100%">
